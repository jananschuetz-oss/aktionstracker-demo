<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- V9: App-Icon – Midnight Navy + Türkis-Akzent, frisch und modern -->
  <defs>
    <linearGradient id="g9" x1="135%" y1="0%" x2="0%" y2="135%">
      <stop offset="0%" style="stop-color:#0f2540"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#g9)"/>
  <!-- Großes helles A als Hintergrundform -->
  <text x="55" y="148" font-family="Arial Black,sans-serif" font-size="130" font-weight="900"
        fill="rgba(255,255,255,0.04)">A</text>
  <!-- AT -->
  <text x="100" y="118" font-family="Arial Black,sans-serif" font-size="76" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="-4">AT</text>
  <!-- Türkis-Strich als Unterstrich mit Punkt -->
  <rect x="38" y="133" width="108" height="5" rx="2.5" fill="#00c8b4"/>
  <circle cx="158" cy="135.5" r="5" fill="#00c8b4"/>
  <!-- Subtext -->
  <text x="100" y="168" font-family="Arial,sans-serif" font-size="10.5" font-weight="600"
        fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3.5">AKTIONS TRACKER</text>
</svg>
