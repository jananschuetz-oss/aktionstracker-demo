<div class="small fw-bold text-muted mb-1">Meine Unterschrift <span class="fw-normal">(für Urlaubsanträge)</span></div>
{% if mein_signatur %}
<div class="mb-2">
  <img src="{{ mein_signatur }}" style="max-height:50px;border:1px solid #dee2e6;border-radius:4px;background:#fff" alt="Meine Unterschrift">
</div>
<div class="d-flex gap-2 mb-1">
  <button type="button" class="btn btn-sm btn-outline-secondary" id="btnSignaturNeu"><i class="bi bi-pencil me-1"></i>Neu zeichnen</button>
  <button type="button" class="btn btn-sm btn-outline-danger" id="btnSignaturLoeschen"><i class="bi bi-trash me-1"></i>Löschen</button>
</div>
{% else %}
<button type="button" class="btn btn-sm btn-outline-primary mb-1" id="btnSignaturNeu"><i class="bi bi-pencil me-1"></i>Unterschrift hinterlegen</button>
{% endif %}
<div id="signaturPadWrap" class="d-none mt-2">
  <canvas id="signaturCanvas" width="300" height="120"
          style="border:1px solid #adb5bd;border-radius:4px;background:#fff;touch-action:none;width:100%;max-width:300px;height:120px;cursor:crosshair"></canvas>
  <div class="mt-2 d-flex gap-2">
    <button type="button" class="btn btn-sm btn-secondary" id="btnSignaturClear">Leeren</button>
    <button type="button" class="btn btn-sm btn-primary" id="btnSignaturSpeichern">Speichern</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" id="btnSignaturAbbrechen">Abbrechen</button>
  </div>
</div>

<script>
(function() {
  var wrap = document.getElementById('signaturPadWrap');
  if (!wrap || wrap.dataset.wired) return;
  wrap.dataset.wired = '1';

  var canvas = document.getElementById('signaturCanvas');
  var ctx = canvas.getContext('2d');
  var zeichnend = false;
  var hatInhalt = false;

  function pos(e) {
    var rect = canvas.getBoundingClientRect();
    var sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    var cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return {x: cx * sx, y: cy * sy};
  }
  function start(e) {
    e.preventDefault();
    zeichnend = true;
    hatInhalt = true;
    var p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    if (!zeichnend) return;
    e.preventDefault();
    var p = pos(e);
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  function end() { zeichnend = false; }
  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hatInhalt = false;
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive: false});
  canvas.addEventListener('touchmove', move, {passive: false});
  canvas.addEventListener('touchend', end);

  document.addEventListener('click', function(e) {
    if (e.target.closest('#btnSignaturNeu')) {
      clearCanvas();
      wrap.classList.remove('d-none');
    } else if (e.target.closest('#btnSignaturClear')) {
      clearCanvas();
    } else if (e.target.closest('#btnSignaturAbbrechen')) {
      wrap.classList.add('d-none');
    } else if (e.target.closest('#btnSignaturLoeschen')) {
      if (!confirm('Hinterlegte Unterschrift wirklich löschen?')) return;
      fetch('{{ url_for("profil_signatur_loeschen") }}', {method: 'POST'})
        .then(function() { location.reload(); });
    } else if (e.target.closest('#btnSignaturSpeichern')) {
      if (!hatInhalt) { alert('Bitte zuerst unterschreiben.'); return; }
      fetch('{{ url_for("profil_signatur") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({signatur: canvas.toDataURL('image/png')})
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.ok) { location.reload(); } else { alert(res.error || 'Speichern fehlgeschlagen.'); }
      });
    }
  });
})();
</script>
