<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neues Passwort – Aktions Tracker – {{ company_short }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 60%, #4a8fc4 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 1rem;
    }
    .login-card {
      background: #fff; border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      padding: 2.5rem 2.25rem; width: 100%; max-width: 420px;
    }
    .brand-header { text-align: center; margin-bottom: 2rem; }
    .brand-header .icon { font-size: 3.5rem; }
    .brand-header h1 { font-size: 1.5rem; font-weight: 800; color: #1a3a5c; margin: .5rem 0 .25rem; }
    .brand-header p  { color: #666; font-size: .9rem; margin: 0; }
    .form-label { font-weight: 600; color: #1a3a5c; font-size: .9rem; }
    .form-control:focus {
      border-color: #2e6da4; box-shadow: 0 0 0 .2rem rgba(46,109,164,.25);
    }
    .btn-submit {
      background: linear-gradient(135deg, #145a32, #27ae60);
      border: none; color: white; font-weight: 700;
      padding: .75rem; border-radius: .5rem; font-size: 1rem;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .9; color: white; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand-header">
    <div class="icon">🔐</div>
    <h1>Neues Passwort</h1>
    <p>Hallo <strong>{{ name }}</strong>, vergeben Sie Ihr neues Passwort</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 mb-3" role="alert">
        <i class="bi bi-{% if category=='success' %}check-circle{% elif category=='danger' %}exclamation-circle{% else %}info-circle{% endif %} me-1"></i>
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label"><i class="bi bi-key me-1"></i>Neues Passwort</label>
      <input type="password" name="passwort" class="form-control form-control-lg"
             placeholder="Mindestens 6 Zeichen"
             required minlength="6" autocomplete="new-password" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label"><i class="bi bi-key-fill me-1"></i>Passwort bestätigen</label>
      <input type="password" name="passwort2" class="form-control form-control-lg"
             placeholder="Passwort wiederholen"
             required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-submit w-100 mb-3">
      <i class="bi bi-check-circle me-2"></i>Passwort speichern
    </button>
  </form>

  <div class="text-center">
    <a href="{{ url_for('login') }}" class="text-muted small" style="text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i>Zurück zur Anmeldung
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Client-side password match validation
document.querySelector('form').addEventListener('submit', function(e) {
  const p1 = document.querySelector('[name="passwort"]').value;
  const p2 = document.querySelector('[name="passwort2"]').value;
  if (p1 !== p2) {
    e.preventDefault();
    alert('Die Passwörter stimmen nicht überein. Bitte erneut eingeben.');
  }
});
</script>
</body>
</html>
